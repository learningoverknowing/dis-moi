<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#f4f1ea">
<title>dis-moi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #f4f1ea; color: #1a1a17; font-family: 'Fraunces', Georgia, serif; }
  textarea:focus, button:focus { outline: none; }
  button { font-family: inherit; }
  .chip:hover { background: #1a1a17 !important; color: #f4f1ea !important; }
  .speak-btn:hover { background: rgba(192,57,43,0.08) !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const ink = "#1a1a17";
const paper = "#f4f1ea";
const rouge = "#c0392b";
const gold = "#b8860b";
const soft = "#6b6a63";
const softBorder = "rgba(107,106,99,0.2)";

const SAMPLES = [
  "pharmacy — want Vitamin C serum and sunscreen, budget around €20",
  "boulangerie — half baguette, not too cooked, ask if they have pain au levain",
  "café — double espresso with ice, and tap water, not sparkling",
  "market — buying vegetables, want to ask what's freshest today",
  "supermarket — looking for laundry detergent and fabric softener",
  "restaurant — ask to move to a quieter table, politely",
];

const SYSTEM = `You are a Parisian friend giving someone a situational briefing before they walk into a real French environment. They tell you where they're going and what they need. Your job is to equip them — not hand them a script, but prepare them to navigate the situation themselves with confidence.

Given their situation, respond with ONLY valid JSON, no markdown, no preamble:

{
  "situation": "one-line restatement of what they're doing",
  "briefing": "the single most important thing to know going in — cultural, practical, or linguistic. One sentence, sharp.",
  "phrases": [
    {"fr": "natural French phrase", "en": "what it means in English", "when": "the exact moment to use this"}
  ],
  "vocabulary": [
    {"fr": "word or label they will see or hear", "en": "what it means", "tip": "short useful note, or empty string"}
  ],
  "they_might_say": [
    {"fr": "what someone will likely say to them", "en": "what it means", "reply": "how to respond in French"}
  ],
  "look_for": ["practical tip 1", "practical tip 2"],
  "budget_note": "brief note on pricing or value for their budget — empty string if not relevant"
}

Rules: 3-4 phrases max. 4-6 vocabulary items. 2-3 things they might hear. 2-3 look_for tips. Keep it real and current. Parisian friend energy: warm, direct, no fluff. Politeness matters — greet first, use conditional, vouvoiement with strangers.`;

async function callModel(situation) {
  const res = await fetch("https://dis-moi-api.learningoverknowing.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: SYSTEM, situation }),
  });
  if (!res.ok) throw new Error("API not reachable — check that dis-moi-api worker is deployed.");
  const data = await res.json();
  const raw = (data.text || data.content || "").replace(/```json|```/g, "").trim();
  return JSON.parse(raw);
}

function App() {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [result, setResult] = useState(null);
  const [voice, setVoice] = useState(null);

  useEffect(() => {
    const pick = () => {
      const voices = window.speechSynthesis?.getVoices() || [];
      const fr = voices.find(v => v.lang?.startsWith("fr"));
      if (fr) setVoice(fr);
    };
    pick();
    if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = pick;
  }, []);

  const say = (text) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "fr-FR";
    if (voice) u.voice = voice;
    u.rate = 0.88;
    window.speechSynthesis.speak(u);
  };

  async function go(situation) {
    const s = (situation ?? input).trim();
    if (!s) return;
    setLoading(true);
    setError("");
    setResult(null);
    try {
      const r = await callModel(s);
      setResult(r);
    } catch (e) {
      setError(e.message || "Something broke.");
    } finally {
      setLoading(false);
    }
  }

  const SectionHead = ({ label }) => (
    <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: gold, borderBottom: `1px solid ${gold}33`, paddingBottom: 6, marginBottom: 14 }}>
      {label}
    </div>
  );

  const SpeakBtn = ({ text }) => (
    <button className="speak-btn" onClick={() => say(text)}
      style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, background: "transparent", border: `1px solid ${rouge}44`, color: rouge, padding: "3px 9px", borderRadius: 2, cursor: "pointer", marginLeft: 8, verticalAlign: "middle", transition: "background 0.15s" }}>
      ◍
    </button>
  );

  return (
    <div style={{ maxWidth: 620, margin: "0 auto", padding: "36px 20px 72px" }}>

      {/* Header */}
      <header style={{ marginBottom: 32 }}>
        <h1 style={{ fontSize: 36, fontWeight: 600, fontStyle: "italic", letterSpacing: "-0.02em", marginBottom: 4 }}>dis-moi</h1>
        <p style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: soft, textTransform: "uppercase", letterSpacing: "0.15em" }}>
          describe your situation. walk in ready.
        </p>
      </header>

      {/* Input */}
      <div style={{ display: "flex", gap: 8, alignItems: "stretch", marginBottom: 16 }}>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) go(); }}
          placeholder="Where are you going and what do you need? e.g. 'pharmacy — want sunscreen and Vitamin C, budget €20'"
          style={{ flex: 1, padding: "14px 16px", fontSize: 15, fontFamily: "'Fraunces', serif", border: `1.5px solid ${ink}`, borderRadius: 2, background: "transparent", resize: "none", color: ink, lineHeight: 1.5 }}
          rows={2}
        />
        <button onClick={() => go()} disabled={loading}
          style={{ width: 54, fontSize: 22, background: ink, color: paper, border: "none", borderRadius: 2, cursor: loading ? "default" : "pointer", opacity: loading ? 0.5 : 1, flexShrink: 0 }}>
          {loading ? "…" : "→"}
        </button>
      </div>

      {/* Samples */}
      {!result && !loading && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 32 }}>
          {SAMPLES.map(s => (
            <button key={s} className="chip" onClick={() => { setInput(s); go(s); }}
              style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, padding: "7px 12px", border: `1px solid ${soft}66`, borderRadius: 2, background: "transparent", color: soft, cursor: "pointer", transition: "all 0.15s" }}>
              {s}
            </button>
          ))}
        </div>
      )}

      {error && (
        <div style={{ padding: 14, border: `1px solid ${rouge}`, color: rouge, fontFamily: "'DM Mono', monospace", fontSize: 13, borderRadius: 2, marginBottom: 20 }}>
          {error}
        </div>
      )}

      {/* Result */}
      {result && (
        <div>
          {/* Situation + Briefing */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.15em", color: soft, marginBottom: 8 }}>
              {result.situation}
            </div>
            <div style={{ borderLeft: `3px solid ${rouge}`, paddingLeft: 16 }}>
              <p style={{ fontSize: 18, lineHeight: 1.45, fontWeight: 600, fontStyle: "italic" }}>{result.briefing}</p>
            </div>
          </div>

          {/* Phrases */}
          {result.phrases?.length > 0 && (
            <section style={{ marginBottom: 28 }}>
              <SectionHead label="what to say" />
              {result.phrases.map((p, i) => (
                <div key={i} style={{ marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${ink}0d` }}>
                  <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 4, marginBottom: 4 }}>
                    <span style={{ fontSize: 19, fontWeight: 600 }}>{p.fr}</span>
                    <SpeakBtn text={p.fr} />
                  </div>
                  <div style={{ fontSize: 14, color: soft, fontStyle: "italic", marginBottom: 4 }}>{p.en}</div>
                  {p.when && <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, color: gold }}>{p.when}</div>}
                </div>
              ))}
            </section>
          )}

          {/* Vocabulary */}
          {result.vocabulary?.length > 0 && (
            <section style={{ marginBottom: 28 }}>
              <SectionHead label="words you'll see or hear" />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px 20px" }}>
                {result.vocabulary.map((v, i) => (
                  <div key={i}>
                    <button onClick={() => say(v.fr)}
                      style={{ fontSize: 15, fontWeight: 600, color: ink, background: "transparent", border: "none", borderBottom: `1px dotted ${rouge}`, cursor: "pointer", padding: 0, fontFamily: "'Fraunces', serif", marginBottom: 2 }}>
                      {v.fr}
                    </button>
                    <div style={{ fontSize: 13, color: soft }}>{v.en}</div>
                    {v.tip && <div style={{ fontSize: 11, color: gold, fontStyle: "italic", marginTop: 2 }}>{v.tip}</div>}
                  </div>
                ))}
              </div>
            </section>
          )}

          {/* What they might say */}
          {result.they_might_say?.length > 0 && (
            <section style={{ marginBottom: 28 }}>
              <SectionHead label="what they'll say to you" />
              {result.they_might_say.map((t, i) => (
                <div key={i} style={{ marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${ink}0d` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
                    <span style={{ fontSize: 16, fontWeight: 600 }}>{t.fr}</span>
                    <SpeakBtn text={t.fr} />
                  </div>
                  <div style={{ fontSize: 13, color: soft, fontStyle: "italic", marginBottom: 4 }}>{t.en}</div>
                  {t.reply && (
                    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ fontFamily: "'DM Mono', monospace", fontSize: 10, textTransform: "uppercase", letterSpacing: "0.1em", color: soft, marginRight: 4 }}>you say</span>
                      <button onClick={() => say(t.reply)}
                        style={{ fontSize: 14, color: ink, background: "transparent", border: "none", borderBottom: `1px dotted ${soft}`, cursor: "pointer", padding: 0, fontFamily: "'Fraunces', serif" }}>
                        {t.reply}
                      </button>
                      <SpeakBtn text={t.reply} />
                    </div>
                  )}
                </div>
              ))}
            </section>
          )}

          {/* Look for */}
          {result.look_for?.length > 0 && (
            <section style={{ marginBottom: 28 }}>
              <SectionHead label="things to know going in" />
              <ul style={{ listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
                {result.look_for.map((tip, i) => (
                  <li key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                    <span style={{ color: rouge, marginTop: 1 }}>—</span>
                    <span style={{ fontSize: 14, color: ink, lineHeight: 1.5 }}>{tip}</span>
                  </li>
                ))}
              </ul>
            </section>
          )}

          {/* Budget note */}
          {result.budget_note && (
            <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, color: soft, fontStyle: "italic", borderTop: `1px solid ${softBorder}`, paddingTop: 16, marginBottom: 28 }}>
              {result.budget_note}
            </div>
          )}

          {/* Reset */}
          <button onClick={() => { setResult(null); setInput(""); }}
            style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, background: "transparent", border: `1px solid ${soft}66`, color: soft, padding: "8px 16px", borderRadius: 2, cursor: "pointer" }}>
            ← new situation
          </button>
        </div>
      )}

      <footer style={{ textAlign: "center", fontFamily: "'DM Mono', monospace", fontSize: 10, color: soft, marginTop: 48, letterSpacing: "0.1em" }}>
        tap any French to hear it
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
